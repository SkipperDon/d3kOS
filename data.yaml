# YOLOv8 Forward Watch Dataset Configuration
# Marine Object Detection for d3kOS

# Dataset root (current directory where this file is)
path: .

# Training and validation sets
train: images/train
val: images/val

# Number of classes
nc: 6

# Class names
names:
  0: ship
  1: boat
  2: debris
  3: buoy
  4: kayak
  5: log
