# d3kOS Preferences API — nginx proxy snippet
# Add this block inside the existing server {} block in /etc/nginx/sites-enabled/default

location /api/preferences {
    proxy_pass http://127.0.0.1:8107/api/preferences;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    add_header Cache-Control "no-store";
}
