<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyboard Test</title>
  <style>
    body { background: black; color: white; padding: 40px; font-size: 24px; }
    input, textarea { 
      width: 100%; 
      padding: 20px; 
      font-size: 24px; 
      margin: 20px 0;
      background: #222;
      color: white;
      border: 2px solid #00CC00;
    }
        /* d3kOS Touchscreen Scrollbar */
    ::-webkit-scrollbar { width: 40px !important; height: 40px !important; }
    ::-webkit-scrollbar-track { background: #111 !important; border-radius: 8px !important; }
    ::-webkit-scrollbar-thumb { background: #00CC00 !important; border-radius: 8px !important; min-height: 60px !important; }
    ::-webkit-scrollbar-thumb:active { background: #00FF00 !important; }
    * { scrollbar-width: auto !important; scrollbar-color: #00CC00 #111 !important; }
    /* Touch scroll baseline */
    html, body { touch-action: pan-y; }
    </style>
</head>
<body>
  <h1>Keyboard Test</h1>
  <p>Test Input Field:</p>
  <input type="text" placeholder="Type here..." id="testInput">
  
  <p>Test Textarea:</p>
  <textarea rows="3" placeholder="Type here..."></textarea>
  
  <script>
    window.addEventListener('load', () => {
      // Toggle fullscreen OFF
      fetch('http://localhost:1880/toggle-fullscreen', {method: 'POST', mode: 'no-cors'}).catch(() => {});
      
      // Focus input
      setTimeout(() => document.getElementById('testInput').focus(), 500);
    });
  </script>
</body>
</html>
