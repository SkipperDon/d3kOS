<!DOCTYPE html>
<html>
<head>
<title>Welcome to nginx!</title>
<style>
html { color-scheme: light dark; }
body { width: 35em; margin: 0 auto;
font-family: Tahoma, Verdana, Arial, sans-serif; }
        /* d3kOS Touchscreen Scrollbar */
    ::-webkit-scrollbar { width: 40px !important; height: 40px !important; }
    ::-webkit-scrollbar-track { background: #111 !important; border-radius: 8px !important; }
    ::-webkit-scrollbar-thumb { background: #00CC00 !important; border-radius: 8px !important; min-height: 60px !important; }
    ::-webkit-scrollbar-thumb:active { background: #00FF00 !important; }
    * { scrollbar-width: auto !important; scrollbar-color: #00CC00 #111 !important; }
    /* Touch scroll baseline */
    html, body { touch-action: pan-y; }
    </style>
</head>
<body>
<h1>Welcome to nginx!</h1>
<p>If you see this page, the nginx web server is successfully installed and
working. Further configuration is required.</p>

<p>For online documentation and support please refer to
<a href="http://nginx.org/">nginx.org</a>.<br/>
Commercial support is available at
<a href="http://nginx.com/">nginx.com</a>.</p>

<p><em>Thank you for using nginx.</em></p>
</body>
</html>
