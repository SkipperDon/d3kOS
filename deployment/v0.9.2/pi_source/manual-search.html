<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Searching for Manuals - d3kOS</title>
  <style>
    body {
      background: #000;
      color: #fff;
      padding: 0;
      margin: 0;
      font-size: 22px;
      font-family: Arial, sans-serif;
    }
    .nav-bar {
      background: #000;
      border-bottom: 2px solid #0C0;
      padding: 15px 20px;
      text-align: center;
    }
    .title {
      font-size: 28px;
      color: #0C0;
      font-weight: bold;
    }
    .content {
      padding: 40px;
      max-width: 800px;
      margin: 0 auto;
    }
    h2 {
      color: #0C0;
      font-size: 28px;
      margin-bottom: 15px;
    }
    .status {
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 8px;
      padding: 30px;
      margin: 20px 0;
      text-align: center;
    }
    .spinner {
      border: 4px solid #333;
      border-top: 4px solid #0C0;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .searching-list {
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
    }
    .search-item {
      padding: 10px 0;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .search-item:last-child {
      border-bottom: none;
    }
    .search-name {
      color: #fff;
    }
    .search-status {
      color: #0C0;
      font-weight: bold;
    }
    .search-status.searching {
      color: #ff0;
    }
    .search-status.found {
      color: #0C0;
    }
    .search-status.notfound {
      color: #666;
    }
    .results-summary {
      background: #1a1a1a;
      border: 2px solid #0C0;
      border-radius: 8px;
      padding: 30px;
      margin: 30px 0;
    }
    .summary-item {
      padding: 15px 0;
      font-size: 20px;
    }
    .summary-value {
      color: #0C0;
      font-weight: bold;
      font-size: 28px;
    }
    .btn {
      background: #0C0;
      color: #000;
      border: none;
      padding: 15px 40px;
      font-size: 22px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
    }
    .btn:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }
        /* d3kOS Touchscreen Scrollbar */
    ::-webkit-scrollbar { width: 40px !important; height: 40px !important; }
    ::-webkit-scrollbar-track { background: #111 !important; border-radius: 8px !important; }
    ::-webkit-scrollbar-thumb { background: #00CC00 !important; border-radius: 8px !important; min-height: 60px !important; }
    ::-webkit-scrollbar-thumb:active { background: #00FF00 !important; }
    * { scrollbar-width: auto !important; scrollbar-color: #00CC00 #111 !important; }
    /* Touch scroll baseline */
    html, body { touch-action: pan-y; }
    </style>
</head>
<body>
  <div class="nav-bar">
    <div class="title">d3kOS Manual Search</div>
  </div>

  <div class="content">
    <h2>Searching for Manuals...</h2>
    <p>Finding and downloading manuals based on your configuration.</p>

    <div class="status" id="statusBox">
      <div class="spinner" id="spinner"></div>
      <p id="statusText">Initializing search...</p>
    </div>

    <div class="searching-list" id="searchList" style="display:none">
      <h3 style="color:#0C0;margin-bottom:15px">Search Progress:</h3>
      <div id="searches"></div>
    </div>

    <div class="results-summary" id="results" style="display:none">
      <h3 style="color:#0C0;margin-bottom:15px">Search Complete!</h3>
      <div class="summary-item">
        <span class="summary-value" id="foundCount">0</span> manuals downloaded
      </div>
      <div class="summary-item" style="font-size:18px;color:#666" id="notFoundList"></div>
      <button class="btn" onclick="location.href='/'">Go to Main Menu</button>
    </div>
  </div>

  <script>
    // Get configuration from localStorage
    const config = JSON.parse(localStorage.getItem('onboarding-config') || '{}');

    // Display what we're searching for
    const searches = {
      boat: config.q1 && config.q3 ? `${config.q1} ${config.q3} Owner's Manual` : null,
      engine: config.q5 && config.q6 ? `${config.q5} ${config.q6} Service Manual` : null,
      cx5106: 'CX5106 NMEA2000 Gateway Manual'
    };

    // Start search
    window.addEventListener('load', async () => {
      // Show search list
      document.getElementById('searchList').style.display = 'block';
      const searchesDiv = document.getElementById('searches');

      // Display searches
      Object.entries(searches).forEach(([key, name]) => {
        if (name) {
          const item = document.createElement('div');
          item.className = 'search-item';
          item.id = 'search-' + key;
          item.innerHTML = `
            <span class="search-name">${name}</span>
            <span class="search-status searching">Searching...</span>
          `;
          searchesDiv.appendChild(item);
        }
      });

      // Call API
      try {
        document.getElementById('statusText').textContent = 'Searching online databases...';

        const response = await fetch('/manuals/auto-search', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(config)
        });

        const data = await response.json();

        // Hide spinner
        document.getElementById('spinner').style.display = 'none';

        if (data.success) {
          const results = data.results;

          // Update status for each search
          Object.keys(searches).forEach(key => {
            const item = document.getElementById('search-' + key);
            if (item) {
              const statusSpan = item.querySelector('.search-status');
              const found = results.downloaded.some(d => d.filename.toLowerCase().includes(key));
              
              if (found) {
                statusSpan.textContent = '✓ Found';
                statusSpan.className = 'search-status found';
              } else {
                statusSpan.textContent = 'Not Found';
                statusSpan.className = 'search-status notfound';
              }
            }
          });

          // Show results summary
          document.getElementById('statusBox').style.display = 'none';
          document.getElementById('results').style.display = 'block';
          document.getElementById('foundCount').textContent = results.downloaded.length;

          if (results.failed.length > 0 || results.downloaded.length < 3) {
            const notFoundText = 'Some manuals were not found automatically. You can upload them manually using the "Upload Manual" button on the main menu.';
            document.getElementById('notFoundList').textContent = notFoundText;
          }

        } else {
          document.getElementById('statusText').textContent = 'Search failed: ' + (data.error || 'Unknown error');
          document.getElementById('statusText').style.color = '#f00';
          setTimeout(() => {
            location.href = '/';
          }, 3000);
        }

      } catch (error) {
        console.error('Search error:', error);
        document.getElementById('statusText').textContent = 'Search error: ' + error.message;
        document.getElementById('statusText').style.color = '#f00';
        setTimeout(() => {
          location.href = '/';
        }, 3000);
      }
    });

    // Toggle fullscreen on completion
    async function complete() {
      try {
        await fetch('http://localhost:1880/toggle-fullscreen', {
          method: 'POST',
          mode: 'no-cors'
        });
      } catch (e) {
        console.error('Fullscreen toggle failed:', e);
      }
      setTimeout(() => {
        window.location.href = '/';
      }, 500);
    }
  </script>
</body>
</html>
