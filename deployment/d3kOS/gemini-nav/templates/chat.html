<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>d3kOS &mdash; AI Navigation</title>
  <style>
    :root {
      --bg:         #000000;
      --surface:    #0d1117;
      --surface2:   #161b22;
      --accent:     #00CC00;
      --accent-dim: rgba(0, 204, 0, 0.12);
      --accent-bdr: rgba(0, 204, 0, 0.3);
      --warn:       #F0A500;
      --muted:      rgba(255, 255, 255, 0.5);
      --text:       #FFFFFF;
      --bar-h:      48px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* TOP BAR */
    #topbar {
      height: var(--bar-h);
      background: var(--surface);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 10px;
      border-bottom: 2px solid var(--accent);
      flex-shrink: 0;
    }
    .back-btn {
      background: var(--surface2);
      color: var(--accent);
      border: 1px solid var(--accent-bdr);
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      white-space: nowrap;
    }
    .back-btn:hover { background: var(--accent); color: var(--bg); }
    .topbar-title {
      font-weight: 700;
      color: var(--accent);
      font-size: 0.95rem;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #source-badge {
      font-size: 0.7rem;
      font-family: 'Roboto Mono', monospace;
      padding: 3px 8px;
      border-radius: 10px;
      border: 1px solid var(--accent-bdr);
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    #source-badge.gemini { border-color: var(--accent); color: var(--accent); }
    #source-badge.ollama { border-color: var(--warn);   color: var(--warn); }

    /* MESSAGES AREA */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.95rem;
      line-height: 1.6;
      word-break: break-word;
    }
    .msg-user {
      background: var(--accent-dim);
      border: 1px solid var(--accent-bdr);
      align-self: flex-end;
      color: var(--text);
    }
    .msg-ai {
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.08);
      align-self: flex-start;
      color: var(--text);
    }
    .msg-source {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 6px;
      font-family: 'Roboto Mono', monospace;
    }
    .msg-source.gemini { color: var(--accent); }
    .msg-source.ollama { color: var(--warn); }
    .msg-error {
      background: rgba(255,51,51,0.1);
      border: 1px solid rgba(255,51,51,0.4);
      align-self: flex-start;
      color: #FF6666;
    }

    /* TYPING INDICATOR */
    #typing {
      display: none;
      align-self: flex-start;
      padding: 10px 16px;
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      gap: 6px;
      align-items: center;
    }
    #typing.visible { display: flex; }
    .dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* INPUT AREA */
    #input-area {
      padding: 10px 12px;
      background: var(--surface);
      border-top: 1px solid var(--accent-bdr);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #msg-input {
      flex: 1;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--accent-bdr);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 1rem;
      font-family: inherit;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      outline: none;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 44px;
      min-width: 72px;
      flex-shrink: 0;
    }
    #send-btn:disabled {
      background: rgba(0,204,0,0.3);
      color: rgba(0,0,0,0.5);
      cursor: not-allowed;
    }
    #send-btn:hover:not(:disabled) { background: #00ee00; }

    /* WELCOME STATE */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 40px 20px;
      text-align: center;
    }
    .welcome-icon  { font-size: 52px; margin-bottom: 16px; }
    .welcome-title { font-size: 1.4rem; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
    .welcome-sub   { color: var(--muted); font-size: 0.9rem; line-height: 1.7; }
    .suggest-chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-top: 20px;
    }
    .chip {
      background: var(--surface2);
      border: 1px solid var(--accent-bdr);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      color: var(--muted);
    }
    .chip:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--text); }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div id="topbar">
    <a href="http://localhost:3000" class="back-btn">&#9664; Dashboard</a>
    <span class="topbar-title">&#129302; AI Navigation &mdash; {{ vessel }}</span>
    <span id="source-badge">{{ model }}</span>
  </div>

  <!-- MESSAGES -->
  <div id="messages">
    <!-- Welcome screen shown until first message -->
    <div id="welcome">
      <div class="welcome-icon">&#129302;</div>
      <div class="welcome-title">Marine AI Assistant</div>
      <div class="welcome-sub">
        Ask about ports, anchorages, passage planning,<br>
        tides, fuel docks, customs, or local hazards.
      </div>
      <div class="suggest-chips">
        <button class="chip" onclick="send('Best anchorages near Georgian Bay?')">Georgian Bay anchorages</button>
        <button class="chip" onclick="send('Fuel docks in Kingston Ontario?')">Kingston fuel docks</button>
        <button class="chip" onclick="send('VHF channel for Canadian coast guard?')">Coast Guard VHF</button>
        <button class="chip" onclick="send('Tidal considerations entering a tidal river?')">Tidal river entry</button>
      </div>
    </div>

    <!-- Typing indicator -->
    <div id="typing">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- INPUT -->
  <div id="input-area">
    <textarea
      id="msg-input"
      placeholder="Ask a marine navigation question..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)">
    </textarea>
    <button id="send-btn" onclick="sendFromButton()">Send</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('msg-input');
    const sendBtn    = document.getElementById('send-btn');
    const typingEl   = document.getElementById('typing');
    const welcomeEl  = document.getElementById('welcome');
    const badgeEl    = document.getElementById('source-badge');

    let busy = false;

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      // Enter sends; Shift+Enter inserts newline
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendFromButton();
      }
    }

    function sendFromButton() {
      const text = inputEl.value.trim();
      if (text) send(text);
    }

    function send(text) {
      if (busy || !text.trim()) return;

      // Hide welcome screen on first message
      if (welcomeEl) welcomeEl.style.display = 'none';

      appendMessage(text, 'user');
      inputEl.value = '';
      inputEl.style.height = 'auto';
      setbusy(true);

      fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      })
        .then(r => r.json().then(d => ({ ok: r.ok, data: d })))
        .then(({ ok, data }) => {
          setbusy(false);
          if (!ok || data.error) {
            appendError(data.error || 'Unknown error');
          } else {
            appendAI(data.response, data.source, data.tokens);
            updateBadge(data.source);
          }
        })
        .catch(err => {
          setbusy(false);
          appendError('Network error: ' + err.message);
        });
    }

    function appendMessage(text, type) {
      const el = document.createElement('div');
      el.className = 'msg msg-' + type;
      el.textContent = text;
      insertBeforeTyping(el);
      scrollDown();
    }

    function appendAI(text, source, tokens) {
      const el = document.createElement('div');
      el.className = 'msg msg-ai';
      el.textContent = text;

      const src = document.createElement('div');
      src.className = 'msg-source ' + source;
      src.textContent = source + (tokens ? '  \u00b7  ' + tokens + ' tokens' : '');
      el.appendChild(src);

      insertBeforeTyping(el);
      scrollDown();
    }

    function appendError(text) {
      const el = document.createElement('div');
      el.className = 'msg msg-error';
      el.textContent = '\u26a0 ' + text;
      insertBeforeTyping(el);
      scrollDown();
    }

    function insertBeforeTyping(el) {
      messagesEl.insertBefore(el, typingEl);
    }

    function setbusy(state) {
      busy = state;
      sendBtn.disabled = state;
      typingEl.classList.toggle('visible', state);
      if (state) scrollDown();
    }

    function scrollDown() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function updateBadge(source) {
      badgeEl.textContent = source === 'gemini' ? '{{ model }}' : 'ollama (offline)';
      badgeEl.className = source;
    }
  </script>

</body>
</html>
