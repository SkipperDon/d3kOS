<!DOCTYPE html>
<html lang="{{ ui_lang }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>d3kOS &middot; Boat Log</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/d3kos.css') }}?v=15">
<style>
  /* ── Page layout ── */
  .bl-wrap {
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  }
  .bl-body {
    flex: 1; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    padding: 20px 16px 32px;
    background: var(--bg);
  }
  .bl-inner { max-width: 720px; margin: 0 auto; }

  /* ── Status bar — back button ── */
  .bl-back {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 18px; font-weight: 700; letter-spacing: .06em;
    color: rgba(255,255,255,.7); text-decoration: none;
    display: flex; align-items: center; gap: 6px;
    padding: 4px 8px 4px 0; flex-shrink: 0;
  }
  .bl-back:hover { color: #fff; }
  .bl-page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: .15em; color: #fff;
    flex: 1;
  }

  /* ── Section headings ── */
  .bl-sec-head {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: .14em; color: var(--g-txt);
    margin: 0 0 12px 0;
    border-bottom: 2px solid var(--g-bdr);
    padding-bottom: 8px;
  }

  /* ── Voice record panel ── */
  .bl-record-panel {
    background: var(--cell);
    border: 1px solid var(--rule);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    box-shadow: var(--e1);
  }
  .bl-rec-btn {
    width: 96px; height: 96px; border-radius: 50%;
    background: var(--g-txt); border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; cursor: pointer;
    transition: all .2s; box-shadow: 0 4px 20px rgba(0,68,0,.3);
    flex-shrink: 0;
  }
  .bl-rec-btn:active { transform: scale(.94); }
  .bl-rec-btn.recording {
    background: #BB0000;
    animation: recPulse 1s ease-in-out infinite;
    box-shadow: 0 4px 20px rgba(187,0,0,.4);
  }
  @keyframes recPulse {
    0%,100% { box-shadow: 0 4px 20px rgba(187,0,0,.4); }
    50%      { box-shadow: 0 4px 32px rgba(187,0,0,.7); }
  }
  .bl-rec-state {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 20px; font-weight: 700; letter-spacing: .12em;
    color: var(--ink3); text-align: center;
  }
  .bl-rec-state.live   { color: #BB0000; }
  .bl-rec-state.saving { color: var(--g-txt); }
  .bl-rec-timer {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; letter-spacing: .1em; color: var(--ink);
    display: none;
  }
  .bl-rec-timer.show { display: block; }
  .bl-rec-hint {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 18px; color: var(--ink3);
    text-align: center; line-height: 1.6;
  }

  /* ── Transcript result ── */
  .bl-transcript {
    display: none;
    background: var(--g-dim); border: 1px solid var(--g-bdr);
    border-radius: 10px; padding: 14px 16px;
    font-family: 'Chakra Petch', sans-serif;
    font-size: 18px; color: var(--ink); line-height: 1.7;
    margin-top: 4px; width: 100%;
  }
  .bl-transcript.show { display: block; }
  .bl-transcript-head {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: .16em;
    color: var(--g-txt); margin-bottom: 6px;
  }
  .bl-transcript-text { font-style: italic; color: var(--ink2); }

  /* ── Service status bar ── */
  .bl-status-bar {
    background: var(--panel); border: 1px solid var(--rule);
    border-radius: 10px; padding: 12px 16px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    margin-bottom: 20px; box-shadow: var(--e1);
  }
  .bl-stat {
    display: flex; align-items: center; gap: 8px; flex: 1; min-width: 120px;
  }
  .bl-stat-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--ink3); flex-shrink: 0; transition: background .3s;
  }
  .bl-stat-dot.ok  { background: var(--g-txt); }
  .bl-stat-dot.off { background: #BB0000; }
  .bl-stat-label {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 18px; font-weight: 700; color: var(--ink);
  }
  .bl-stat-val {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 18px; color: var(--ink3);
  }

  /* ── Entry list ── */
  .bl-list { display: flex; flex-direction: column; gap: 10px; }
  .bl-entry {
    background: var(--cell); border: 1px solid var(--rule);
    border-radius: 12px; padding: 14px 16px;
    box-shadow: var(--e1); transition: border-color .15s;
  }
  .bl-entry:hover { border-color: var(--g-bdr); }
  .bl-entry-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px; gap: 8px;
  }
  .bl-entry-ts {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 18px; font-weight: 700; letter-spacing: .1em;
    color: var(--ink3); text-transform: uppercase; flex-shrink: 0;
  }

  /* ── Entry type badge — one class per type ── */
  .bl-entry-type {
    display: inline-block; border-radius: 6px; padding: 3px 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: .12em; flex-shrink: 0;
  }
  .bl-entry-type.voice   { background: var(--g-dim);        border: 1px solid var(--g-bdr); color: var(--g-txt); }
  .bl-entry-type.engine  { background: rgba(184,120,0,.15); border: 1px solid #B87800;      color: #D4920F; }
  .bl-entry-type.weather { background: rgba(26,122,158,.15); border: 1px solid #1A7A9E;     color: #22A0C8; }
  .bl-entry-type.alert   { background: rgba(187,0,0,.15);   border: 1px solid #BB0000;      color: #EE3333; }

  .bl-entry-text {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 18px; color: var(--ink); line-height: 1.7;
  }
  .bl-entry-del {
    background: none; border: none; color: var(--ink3);
    font-size: 20px; cursor: pointer;
    padding: 4px 8px; min-width: 36px; min-height: 36px;
    display: flex; align-items: center; justify-content: center;
    transition: color .15s; flex-shrink: 0;
  }
  .bl-entry-del:hover { color: #BB0000; }

  /* ── Engine entry data display ── */
  .bl-engine-event {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: .1em; color: #D4920F;
    margin-bottom: 8px;
  }
  .bl-engine-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 6px 16px;
  }
  .bl-eng-cell { display: flex; flex-direction: column; gap: 2px; }
  .bl-eng-lbl {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 18px; font-weight: 700; letter-spacing: .08em;
    color: var(--ink3); text-transform: uppercase;
  }
  .bl-eng-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px; letter-spacing: .06em; color: var(--ink);
  }
  .bl-eng-val.warn { color: #EE3333; }

  /* ── Empty state ── */
  .bl-empty {
    text-align: center; padding: 48px 24px; color: var(--ink3);
  }
  .bl-empty-icon { font-size: 48px; opacity: .3; margin-bottom: 12px; }
  .bl-empty-text {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 20px; font-weight: 600; letter-spacing: .04em;
  }

  /* ── Export row ── */
  .bl-export-row {
    display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .bl-export-btn {
    flex: 1; min-width: 140px; height: 52px;
    background: none; border: 2px solid var(--g-bdr);
    border-radius: 10px; color: var(--g-txt);
    font-family: 'Chakra Petch', sans-serif;
    font-size: 20px; font-weight: 700; letter-spacing: .06em;
    cursor: pointer; transition: all .15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .bl-export-btn:hover  { background: var(--g-dim); }
  .bl-export-btn:active { background: var(--g-dim); filter: brightness(.9); }
</style>
</head>
<body>

<div class="bl-wrap">

  <!-- Status bar -->
  <div id="sb">
    <a href="/" class="bl-back">&#9664;</a>
    <div class="sb-sep"></div>
    <div class="bl-page-title">Boat Log</div>
    <div class="sb-right">
      <div id="clk"></div>
    </div>
  </div>

  <!-- Scrollable body -->
  <div class="bl-body">
  <div class="bl-inner">

    <!-- Service status bar -->
    <div class="bl-status-bar" id="bl-status-bar">
      <div class="bl-stat">
        <div class="bl-stat-dot" id="api-dot"></div>
        <span class="bl-stat-label">Log API</span>
        <span class="bl-stat-val" id="api-status">checking…</span>
      </div>
      <div class="bl-stat">
        <div class="bl-stat-dot" id="count-dot"></div>
        <span class="bl-stat-label">Entries</span>
        <span class="bl-stat-val" id="entry-count">—</span>
      </div>
      <div class="bl-stat">
        <span class="bl-stat-label">Session</span>
        <span class="bl-stat-val" id="session-count">0</span>
      </div>
    </div>

    <!-- Voice Record Panel -->
    <div class="bl-sec-head">Voice Note</div>
    <div class="bl-record-panel" id="record-panel">
      <button class="bl-rec-btn" id="rec-btn" onclick="toggleRecord()" title="Tap to record">
        <span id="rec-icon">🎤</span>
      </button>
      <div class="bl-rec-state" id="rec-state">TAP TO RECORD</div>
      <div class="bl-rec-timer" id="rec-timer">0:00</div>
      <div class="bl-rec-hint" id="rec-hint">
        Records and transcribes via the d3kOS voice API.<br>
        Tap once to start, tap again to stop and save.
      </div>
      <div class="bl-transcript" id="bl-transcript">
        <div class="bl-transcript-head">Transcript</div>
        <div class="bl-transcript-text" id="transcript-text"></div>
      </div>
    </div>

    <!-- Export buttons -->
    <div class="bl-export-row">
      <button class="bl-export-btn" onclick="exportCSV()">📥 Export CSV</button>
      <button class="bl-export-btn" onclick="refreshStatus()">↺ Refresh</button>
    </div>

    <!-- Entry list -->
    <div class="bl-sec-head">Log Entries</div>
    <div class="bl-list" id="bl-entry-list">
      <div class="bl-empty">
        <div class="bl-empty-icon">📋</div>
        <div class="bl-empty-text">No entries yet — record your first voice note.</div>
      </div>
    </div>

  </div><!-- .bl-inner -->
  </div><!-- .bl-body -->

</div><!-- .bl-wrap -->

<script>
/* ── Boatlog page — v0.9.2.3 Session D
   Voice log + engine entry rendering.
   Engine capture is handled by boatlog-engine.js loaded at end of body.
   API: boatlog-export-api.py at localhost:8095
*/

var BOATLOG_API   = 'http://localhost:8095';
var mediaRecorder = null;
var audioChunks   = [];
var recTimerID    = null;
var recSeconds    = 0;
var isRecording   = false;
var LS_KEY        = 'd3kos-boatlog-entries';

/* ── Clock ── */
(function() {
  var el = document.getElementById('clk');
  function tick() {
    var now = new Date();
    el.textContent = now.getHours().toString().padStart(2,'0') + ':' +
                     now.getMinutes().toString().padStart(2,'0');
  }
  tick(); setInterval(tick, 10000);
})();

/* ── Theme — honour localStorage from main dashboard ── */
(function() {
  if (localStorage.getItem('d3kTheme') === 'night') {
    document.body.setAttribute('data-night','');
  }
})();

/* ── localStorage ── */
function loadEntries() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
  catch(e) { return []; }
}
function saveEntries(entries) {
  localStorage.setItem(LS_KEY, JSON.stringify(entries));
}

/* ── Badge class and label per entry type ── */
function _badgeClass(entry) {
  var t = (entry.type || 'voice').toLowerCase();
  if (t === 'engine')  return 'engine';
  if (t === 'weather') return 'weather';
  if (t === 'alert')   return 'alert';
  return 'voice';
}
function _badgeLabel(entry) {
  var t = (entry.type || 'voice').toLowerCase();
  if (t === 'engine') {
    var ev = (entry.event || '').replace('alert_','ALERT: ').replace(/_/g,' ').toUpperCase();
    return 'ENGINE — ' + (ev || 'LOG');
  }
  if (t === 'weather') return 'WEATHER';
  if (t === 'alert')   return 'ALERT';
  return 'VOICE';
}

/* ── Engine data grid for ENGINE entries ── */
function _engineGrid(e) {
  function cell(lbl, val, warn) {
    if (val === null || val === undefined) return '';
    return '<div class="bl-eng-cell">' +
      '<div class="bl-eng-lbl">' + lbl + '</div>' +
      '<div class="bl-eng-val' + (warn ? ' warn' : '') + '">' + val + '</div>' +
    '</div>';
  }
  var ev = (e.event || '').replace(/_/g,' ').toUpperCase();
  return '<div class="bl-engine-event">' + ev + '</div>' +
    '<div class="bl-engine-grid">' +
      cell('RPM',     e.rpm     !== null ? e.rpm            : '—', false) +
      cell('OIL PSI', e.oil_psi !== null ? e.oil_psi        : '—', e.oil_psi !== null && e.oil_psi < 10) +
      cell('COOLANT', e.coolant_c !== null ? e.coolant_c + '°C' : '—', e.coolant_c !== null && e.coolant_c > 100) +
      cell('BATTERY', e.battery_v !== null ? e.battery_v + 'V'  : '—', e.battery_v !== null && (e.battery_v < 11.8 || e.battery_v > 15)) +
      cell('FUEL',    e.fuel_pct  !== null ? e.fuel_pct + '%'   : '—', false) +
    '</div>';
}

/* ── Render entry list ── */
function renderEntries() {
  var entries = loadEntries();
  var el = document.getElementById('bl-entry-list');
  if (!el) return;

  if (!entries.length) {
    el.innerHTML = '<div class="bl-empty">' +
      '<div class="bl-empty-icon">📋</div>' +
      '<div class="bl-empty-text">No entries yet — record your first voice note.</div>' +
      '</div>';
    document.getElementById('session-count').textContent = '0';
    return;
  }

  var html = '';
  entries.forEach(function(e, i) {
    var ts    = new Date(e.timestamp);
    var tsStr = ts.toLocaleDateString(undefined, {month:'short',day:'numeric'}) +
                ' ' + ts.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    var bc    = _badgeClass(e);
    var bl    = _badgeLabel(e);
    var isEng = (e.type || '').toLowerCase() === 'engine';

    html += '<div class="bl-entry">' +
      '<div class="bl-entry-head">' +
        '<span class="bl-entry-ts">' + tsStr + '</span>' +
        '<span class="bl-entry-type ' + bc + '">' + bl + '</span>' +
        '<button class="bl-entry-del" onclick="deleteEntry(' + i + ')" title="Delete">✕</button>' +
      '</div>' +
      (isEng
        ? _engineGrid(e)
        : '<div class="bl-entry-text">' + _esc(e.text || '(no transcript)') + '</div>'
      ) +
    '</div>';
  });
  el.innerHTML = html;
  document.getElementById('session-count').textContent = entries.length;
}

/* Expose to boatlog-engine.js so it can trigger a re-render after writing an entry */
window.renderEntries = renderEntries;

function _esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function deleteEntry(i) {
  var entries = loadEntries();
  entries.splice(i, 1);
  saveEntries(entries);
  renderEntries();
}

/* ── Status check ── */
function refreshStatus() {
  fetch(BOATLOG_API + '/api/boatlog/status')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var dot  = document.getElementById('api-dot');
      var stat = document.getElementById('api-status');
      var cnt  = document.getElementById('entry-count');
      var cdot = document.getElementById('count-dot');
      if (dot)  dot.classList.add('ok');
      if (stat) stat.textContent = 'online';
      if (cnt)  cnt.textContent  = d.entry_count !== undefined ? d.entry_count : '—';
      if (cdot) { cdot.classList.remove('off'); cdot.classList.add('ok'); }
    })
    .catch(function() {
      var dot  = document.getElementById('api-dot');
      var stat = document.getElementById('api-status');
      if (dot)  { dot.classList.remove('ok'); dot.classList.add('off'); }
      if (stat) stat.textContent = 'unavailable';
    });
}

/* ── Recording ── */
function toggleRecord() {
  if (isRecording) { stopRecord(); } else { startRecord(); }
}

function startRecord() {
  if (!window.MediaRecorder) {
    setRecState('error', 'BROWSER NOT SUPPORTED'); return;
  }
  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(function(stream) {
      mediaRecorder = new MediaRecorder(stream);
      audioChunks   = [];
      isRecording   = true;

      mediaRecorder.ondataavailable = function(e) {
        if (e.data.size > 0) audioChunks.push(e.data);
      };
      mediaRecorder.onstop = function() {
        var blob = new Blob(audioChunks, { type: 'audio/webm' });
        stream.getTracks().forEach(function(t) { t.stop(); });
        submitVoiceNote(blob);
      };

      mediaRecorder.start(250);
      recSeconds = 0; updateTimer();
      recTimerID = setInterval(updateTimer, 1000);

      document.getElementById('rec-btn').classList.add('recording');
      document.getElementById('rec-icon').textContent = '⏹';
      document.getElementById('rec-hint').textContent = 'Tap to stop recording';
      setRecState('live', 'RECORDING');
      document.getElementById('rec-timer').classList.add('show');
      document.getElementById('bl-transcript').classList.remove('show');
    })
    .catch(function(err) {
      setRecState('error', 'MICROPHONE UNAVAILABLE');
      console.error('Mic error:', err);
    });
}

function stopRecord() {
  if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
  clearInterval(recTimerID); recTimerID = null; isRecording = false;
  mediaRecorder.stop();
  document.getElementById('rec-btn').classList.remove('recording');
  document.getElementById('rec-icon').textContent = '🎤';
  document.getElementById('rec-hint').textContent = 'Saving and transcribing…';
  setRecState('saving', 'SAVING…');
  document.getElementById('rec-timer').classList.remove('show');
}

function updateTimer() {
  recSeconds++;
  var m = Math.floor(recSeconds / 60);
  var s = (recSeconds % 60).toString().padStart(2,'0');
  document.getElementById('rec-timer').textContent = m + ':' + s;
}

function setRecState(cls, text) {
  var el = document.getElementById('rec-state');
  if (!el) return;
  el.className = 'bl-rec-state';
  if (cls !== 'idle') el.classList.add(cls);
  el.textContent = text;
}

/* ── Submit voice note ── */
function submitVoiceNote(blob) {
  var fd = new FormData();
  fd.append('audio', blob, 'voice-note.webm');

  fetch(BOATLOG_API + '/api/boatlog/voice-note', { method: 'POST', body: fd })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var entries = loadEntries();
      entries.unshift({
        timestamp: d.timestamp || new Date().toISOString(),
        type:      'voice',
        text:      d.transcript || '(no transcript)',
        filename:  d.filename || ''
      });
      saveEntries(entries);
      renderEntries();
      showTranscript(d.transcript || '');
      setRecState('idle', 'TAP TO RECORD');
      document.getElementById('rec-hint').textContent = 'Tap once to start, tap again to stop and save.';
    })
    .catch(function(err) {
      console.error('Voice note error:', err);
      var entries = loadEntries();
      entries.unshift({
        timestamp: new Date().toISOString(),
        type: 'voice', text: '(API unavailable — transcript not saved)', filename: ''
      });
      saveEntries(entries);
      renderEntries();
      setRecState('idle', 'TAP TO RECORD');
      document.getElementById('rec-hint').textContent = 'Tap once to start, tap again to stop and save.';
    });
}

function showTranscript(text) {
  var wrap = document.getElementById('bl-transcript');
  var body = document.getElementById('transcript-text');
  if (!wrap || !body) return;
  body.textContent = text || '(no transcript generated)';
  wrap.classList.add('show');
}

/* ── Export CSV ── */
function exportCSV() {
  fetch(BOATLOG_API + '/api/boatlog/export', { method: 'POST' })
    .then(function(r) {
      if (!r.ok) throw new Error('Export failed: ' + r.status);
      var cd = r.headers.get('Content-Disposition') || '';
      var m  = cd.match(/filename="?([^"]+)"?/);
      return r.blob().then(function(b) { return { blob: b, filename: m ? m[1] : 'd3kos_boatlog.csv' }; });
    })
    .then(function(o) {
      var url = URL.createObjectURL(o.blob);
      var a   = document.createElement('a');
      a.href  = url; a.download = o.filename;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    })
    .catch(function(err) { alert('Export failed: ' + err.message); });
}

/* ── Init ── */
document.addEventListener('DOMContentLoaded', function() {
  renderEntries();
  refreshStatus();
});
</script>

<!-- Engine auto-capture module: SK WebSocket → ENGINE entries in boat log -->
<script src="{{ url_for('static', filename='js/boatlog-engine.js') }}"></script>

</body>
</html>
